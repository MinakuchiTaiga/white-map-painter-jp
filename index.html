<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>白地図に色つけちゃうよ～！</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    display:flex;
}

#map {
    flex:1;
    height:100vh;
}

/* ===== コントロール ===== */
.controls{
    width:260px;
    height:100vh;
    overflow:auto;

    padding:10px;
    background:#111;
    color:#fff;

    display:flex;
    flex-direction:column;
    gap:10px;
}

/* ★ 行分け */
.topbar{
    display:flex;
    flex-direction:column;
    gap:8px;
}

/* 色行 */
.color-row{
    display:flex;
    gap:8px;
    align-items:center;
}

/* ボタン行 */
.btn-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

/* ===== 色ボタン ===== */
.color-btn{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid #666;
    cursor:pointer;
    transition:0.2s;
}

.color-btn.active{
    border:3px solid #fff;
    transform:scale(1.2);
}

/* 白用 */
.color-btn[data-color="#ffffff"]{
    border:2px solid #999;
}

/* ===== 通常ボタン ===== */
button{
    cursor:pointer;
    height:38px;
    padding:0 14px;
    border-radius:8px;
    font-size:14px;
}

/* ===== 都道府県 ===== */
.pref-list{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    max-height:none;
    overflow:visible;
}

.pref-list label{
    font-size:12px;
    background:#222;
    padding:3px 6px;
    border-radius:6px;
    cursor:pointer;
}

/* ===== ラベル ===== */
.label{
    font-weight:bold;
    color:#000;
    text-shadow:1px 1px 2px #fff;
    white-space:nowrap;
    cursor:move;

    /* ★ これ追加（四角消す） */
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
}

/* 星の四角消す */
.star-icon{
    background: transparent !important;
    border: none !important;
}

.star-icon div {
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
}

.leaflet-div-icon {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
}

.color-picker-wrap{
    width:26px;
    height:26px;
    border-radius:50%;
    border:2px solid #666;
    cursor:pointer;
    position:relative;
    overflow:hidden;

    /* ★ これが重要：虹グラデーション */
    background: conic-gradient(
        red, orange, yellow, lime, cyan, blue, violet, red
    );
}

.color-picker-wrap.active{
    border:3px solid #fff;
    transform:scale(1.2);
}

.color-picker-wrap input{
    position:absolute;
    inset:0;
    opacity:0; /* ★ 見えなくする */
    cursor:pointer;
}

</style>
</head>

<body>

<div class="controls">

<div class="topbar">

    <!-- ★ 色 -->
    <div class="color-row">
        <div class="color-btn" data-color="#e60000" style="background:#e60000" onclick="setColor('#e60000')"></div>
        <div class="color-btn" data-color="#0070ff" style="background:#0070ff" onclick="setColor('#0070ff')"></div>
        <div class="color-btn" data-color="#00b050" style="background:#00b050" onclick="setColor('#00b050')"></div>
        <div class="color-btn" data-color="#ffff00" style="background:#ffff00" onclick="setColor('#ffff00')"></div>
        <div class="color-btn" data-color="#ff9900" style="background:#ff9900" onclick="setColor('#ff9900')"></div>
        <div class="color-btn" data-color="#ff66cc" style="background:#ff66cc" onclick="setColor('#ff66cc')"></div>
        <div class="color-btn" data-color="#66ccff" style="background:#66ccff" onclick="setColor('#66ccff')"></div>

        <!-- ★ カラーパレット追加 -->
        <div class="color-picker-wrap">
            <input type="color" id="colorPicker" value="#9900ff" onchange="pickColor(this.value)">
        </div>
    </div>

    <!-- ★ ボタン -->
    <div class="btn-row">
        <button onclick="selectAll(true)">全選択</button>
        <button onclick="selectAll(false)">全解除</button>
        <button onclick="resetAll()">全削除</button>
        <button onclick="changeAllLabelSize()">文字サイズ一括</button>
        <button onclick="downloadMap()">画像DL</button>
        <button onclick="toggleStarMode()">★モード</button>
        <button onclick="toggleCircleMode()">◯モード</button>
        <button onclick="hideLabels()">市区町村削除</button>
        <button onclick="showLabels()">市区町村復活</button>
    </div>

    <span style="font-size:16px; color:#ccc;">
    ※★モードと◯モードは、両方が同時にONの状態で使用しないでください！
    </span>

    <span style="font-size:16px; color:#ccc;">
    【市区町村名】<br>
    ・左クリック：サイズ変更<br>
    ・Shift+左クリック：白⇔黒に変更<br>
    ・右クリック：削除<br>
    </span>

    <span style="font-size:16px; color:#ccc;">
    【通常モード】<br>
    ・左クリック：色塗り<br>
    ・右クリック：色削除<br>
    </span>

    <span style="font-size:16px; color:#ccc;">
    【★モード】<br>
    ・地図上で左クリック：星追加<br>
    ・左クリック：サイズ変更<br>
    ・Shift+左クリック：選択中の色に変更<br>
    ・右クリック：削除
    </span>

    <span style="font-size:16px; color:#ccc;">
    【◯モード】<br>
    ・★の上で左クリック：円追加<br>
    ・左クリック：サイズ変更<br>
    ・Shift+左クリック：選択中の色に変更<br>
    ・右クリック：削除
    </span>

</div>

<div id="prefList" class="pref-list"></div>

</div>

<div id="map"></div>

<script>

const map = L.map('map',{
    zoomControl:true,
    attributionControl:false,
    zoomSnap:0.1,
    zoomDelta:0.2,
    wheelPxPerZoomLevel:200,
    preferCanvas:true
}).setView([37.5,137],5);

let layerGroup = L.layerGroup().addTo(map);
let labelLayer = L.layerGroup().addTo(map);
let starLayer = L.layerGroup().addTo(map);

let geoData=null;
let currentColor="#e60000";

let colorData=JSON.parse(localStorage.getItem("colors")||"{}");
let sizeData=JSON.parse(localStorage.getItem("sizes")||"{}");
let starData=JSON.parse(localStorage.getItem("stars")||"[]");
let labelPos=JSON.parse(localStorage.getItem("labels")||"{}");
let labelVisible = JSON.parse(localStorage.getItem("labelVisible") ?? "true");
let labelColorData = JSON.parse(localStorage.getItem("labelColors")||"{}");
let geoCache = {};
let renderedKeys = new Set();

let used=new Set();
let starMode=false;

let circleMode = false;
let circleLayer = L.layerGroup().addTo(map);

function toggleStarMode(){
    starMode=!starMode;
    alert(starMode ? "★モード ON" : "OFF");
}

function toggleCircleMode(){
    circleMode = !circleMode;
    alert(circleMode ? "円モード ON" : "OFF");
}

function setColor(c){
    currentColor=c;

    document.querySelectorAll('.color-btn').forEach(btn=>{
        btn.classList.remove('active');
    });

    document.querySelectorAll('.color-picker-wrap').forEach(p=>{
        p.classList.remove('active');
    });

    const btn = document.querySelector(`[data-color="${c}"]`);
    if(btn) btn.classList.add('active');
}

function getName(f){
    return f.properties.N03_005 || f.properties.N03_004;
}

const PREF_ORDER=["北海道","青森県","岩手県","宮城県","秋田県","山形県","福島県",
"茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県",
"新潟県","富山県","石川県","福井県","山梨県","長野県",
"岐阜県","静岡県","愛知県","三重県",
"滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県",
"鳥取県","島根県","岡山県","広島県","山口県",
"徳島県","香川県","愛媛県","高知県",
"福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県"];

function createPrefUI(data){
    const set=new Set(data.features.map(f=>f.properties.N03_001));
    const container=document.getElementById("prefList");

    PREF_ORDER.forEach(pref=>{
        if(!set.has(pref)) return;
        const label=document.createElement("label");
        const input = document.createElement("input");
        input.type = "checkbox";
        input.value = pref;
        input.onchange = render;
        label.appendChild(input);
        label.appendChild(document.createTextNode(pref));
        container.appendChild(label);
    });
}

function getSelected(){
    return [...document.querySelectorAll("#prefList input:checked")].map(i=>i.value);
}

function selectAll(flag){
    document.querySelectorAll("#prefList input").forEach(i=>i.checked=flag);
    render();
}

async function render(){

    layerGroup.clearLayers();
    labelLayer.clearLayers();
    used.clear();
    renderedKeys.clear();

    const selected = getSelected();
    if(selected.length === 0) return;

    for(const pref of selected){

        try{
            let data = geoCache[pref];
            if(!data){
                const res = await fetch(`geo/${pref}.geojson`);
                if(!res.ok) throw new Error(pref + " 読み込み失敗");
                data = await res.json();
                geoCache[pref] = data;
            }

            L.geoJSON(data,{
                style:f=>{
                    const key=f.properties.N03_007;
                    return{
                        color:"#000",
                        weight:1,
                        fillColor:colorData[key]||"#fff",
                        fillOpacity:1
                    };
                },

                onEachFeature:(f,layer)=>{
                    const key=f.properties.N03_007;
                    const name=getName(f);
                    const safeName = escapeHtml(name || "");
                    if(!name) return;
                    renderedKeys.add(key);

                    // ===== 色塗り =====
                    layer.on('click',()=>{
                        colorData[key]=currentColor;
                        localStorage.setItem("colors",JSON.stringify(colorData));
                        layer.setStyle({fillColor:currentColor});
                    });

                    layer.on('contextmenu',(e)=>{
                        e.originalEvent.preventDefault();
                        delete colorData[key];
                        localStorage.setItem("colors",JSON.stringify(colorData));
                        layer.setStyle({fillColor:"#fff"});
                    });

                    // ===== ラベル =====
                    if(labelVisible && !used.has(key)){
                        used.add(key);

                        let center = labelPos[key] || layer.getBounds().getCenter();

                        const marker = L.marker(center,{
                            draggable:true,
                            icon:L.divIcon({
                                className:'label',
                                html:`<div style="font-size:${sizeData[key]||12}px;color:${labelColorData[key]||'#000'}">${safeName}</div>`
                            })
                        }).addTo(labelLayer);

                        // 右クリック削除
                        marker.on('contextmenu', e=>{
                            e.originalEvent.preventDefault();
                            labelLayer.removeLayer(marker);
                        });

                        // 左クリック
                        marker.on('click', (e)=>{

                            // ★ Shiftで色反転
                            if(e.originalEvent.shiftKey){

                                const current = labelColorData[key] || "#000";
                                const next = current === "#fff" ? "#000" : "#fff";

                                labelColorData[key] = next;
                                localStorage.setItem("labelColors", JSON.stringify(labelColorData));

                                marker.setIcon(L.divIcon({
                                    className:'label',
                                    html:`<div style="font-size:${sizeData[key]||12}px;color:${next}">${safeName}</div>`
                                }));

                                return;
                            }

                            // 通常クリック → サイズ変更
                            const size = prompt("ラベルサイズ(px)", sizeData[key] || 12);
                            const parsedSize = parseFontSize(size);
                            if(parsedSize === null){
                                if(size !== null) alert("1〜300 の数字で入力してください。");
                                return;
                            }
                            sizeData[key] = parsedSize;
                            localStorage.setItem("sizes", JSON.stringify(sizeData));

                            marker.setIcon(L.divIcon({
                                className:'label',
                                html:`<div style="font-size:${sizeData[key]}px;color:${labelColorData[key]||'#000'}">${safeName}</div>`
                            }));
                        });

                        // ドラッグ保存
                        marker.on('dragend', e=>{
                            const pos = e.target.getLatLng();
                            labelPos[key] = {lat:pos.lat,lng:pos.lng};
                            localStorage.setItem("labels", JSON.stringify(labelPos));
                        });
                    }
                }

            }).addTo(layerGroup);

        }catch(err){
            console.error(err);
        }
    }
}

// 星
map.on('click', e=>{
    if(!starMode) return;

    const size = prompt("星サイズ(px)",20);
    const parsedSize = parseFontSize(size);
    if(parsedSize === null){
        if(size !== null) alert("1〜300 の数字で入力してください。");
        return;
    }

    const s={lat:e.latlng.lat,lng:e.latlng.lng,size:parsedSize,color:"#ffd700"};
    starData.push(s);
    localStorage.setItem("stars",JSON.stringify(starData));
    addStar(s);
});

function addStar(s){
    const marker=L.marker([s.lat,s.lng],{
        draggable:true,
        icon: L.divIcon({
            className: 'star-icon',
            html: `<div style="font-size:${s.size}px;color:${s.color};text-shadow:1px 1px 2px #000;">★</div>`,
            iconAnchor: null
        })
    }).addTo(starLayer);

    marker.on('dragend',e=>{
        s.lat=e.target.getLatLng().lat;
        s.lng=e.target.getLatLng().lng;
        localStorage.setItem("stars",JSON.stringify(starData));
    });

    marker.on('click',(e)=>{

        // =========================
        // ★ 円モード（星起点）
        // =========================
        if(circleMode){

            const km = prompt("この星を中心に半径（km）", 10);
            if(km === null) return;

            const parsed = Number(km);
            if(!Number.isFinite(parsed) || parsed <= 0){
                alert("正しい数値を入力してください");
                return;
            }

            const meters = parsed * 1000;

            const circle = L.circle([s.lat, s.lng], {
                radius: meters,
                color: s.circleColor || currentColor,
                fillColor: s.circleColor || currentColor,
                fillOpacity: 0.2,
                weight: 2
            }).addTo(circleLayer);

            // =========================
            // 円の操作
            // =========================
            circle.on('click', function(ev){

                const isShift = ev.originalEvent && ev.originalEvent.shiftKey;

                // ★ Shift + 左クリック → 色変更
                if(isShift){

                    s.circleColor = currentColor;
                    localStorage.setItem("stars", JSON.stringify(starData));

                    this.setStyle({
                        color: currentColor,
                        fillColor: currentColor
                    });

                    return;
                }

                // ★ 通常クリック → 半径変更
                const newKm = prompt("半径（km）", meters / 1000);
                if(newKm === null) return;

                const val = Number(newKm);
                if(!Number.isFinite(val) || val <= 0){
                    alert("正しい数値を入力してください");
                    return;
                }

                this.setRadius(val * 1000);
            });

            circle.on('contextmenu', (ev)=>{
                ev.originalEvent.preventDefault();
                circleLayer.removeLayer(circle);
            });

            return; // ★星処理に流さない
        }

        // =========================
        // 既存：星編集
        // =========================
        if(e.originalEvent.shiftKey){

            // ★ カラーパレットの色を適用
            s.color = currentColor;

        }else{

            const size = prompt("サイズ(px)",s.size);
            const parsedSize = parseFontSize(size);
            if(parsedSize === null){
                if(size !== null) alert("1〜300 の数字で入力してください。");
                return;
            }
            s.size = parsedSize;
        }

        localStorage.setItem("stars",JSON.stringify(starData));

        marker.setIcon(L.divIcon({
            className:'star-icon',
            html:`<div style="font-size:${s.size}px;color:${s.color};text-shadow:1px 1px 2px #000;">★</div>`
        }));
    });

    marker.on('contextmenu',e=>{
        e.originalEvent.preventDefault();
        const idx = starData.indexOf(s);
        if(idx !== -1){
            starData.splice(idx,1);
            localStorage.setItem("stars",JSON.stringify(starData));
        }
        starLayer.removeLayer(marker);
    });
}

// DL
function downloadMap(){
    html2canvas(document.getElementById("map"),{
        useCORS:true,
        scale:2,
        backgroundColor:null
    }).then(canvas=>{
        const link=document.createElement("a");
        link.download="japan_map.png";
        link.href=canvas.toDataURL("image/png");
        link.click();
    });
}

function hideLabels(){
    labelVisible = false;
    localStorage.setItem("labelVisible", JSON.stringify(labelVisible));
    labelLayer.clearLayers();
}

function showLabels(){
    labelVisible = true;
    localStorage.setItem("labelVisible", JSON.stringify(labelVisible));
    render(); // 再描画で復活
}

function pickColor(color){
    currentColor = color;

    // 他の選択解除
    document.querySelectorAll('.color-btn').forEach(btn=>{
        btn.classList.remove('active');
    });

    // パレットをアクティブ化
    document.querySelector('.color-picker-wrap').classList.add('active');
}

function changeAllLabelSize(){
    const size = prompt("全ラベルサイズ(px)", 12);
    const parsedSize = parseFontSize(size);
    if(parsedSize === null){
        if(size !== null) alert("1〜300 の数字で入力してください。");
        return;
    }
    if(renderedKeys.size === 0){
        alert("先に都道府県を選択してください。");
        return;
    }

    renderedKeys.forEach(key=>{
        sizeData[key] = parsedSize;
    });

    localStorage.setItem("sizes", JSON.stringify(sizeData));

    render(); // 再描画
}

function resetAll(){
    if(!confirm("全部リセットしますか？")) return;
    const storageKeys = ["colors","sizes","stars","labels","labelVisible","labelColors"];
    storageKeys.forEach((key)=>localStorage.removeItem(key));

    circleLayer.clearLayers(); // ←これ追加

    location.reload();
}

function escapeHtml(value){
    return String(value).replace(/[&<>"']/g, (ch)=>{
        const map = {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"};
        return map[ch];
    });
}

function parseFontSize(value){
    if(value === null) return null;
    const trimmed = String(value).trim();
    if(trimmed.length === 0) return null;
    const num = Number(trimmed);
    if(!Number.isInteger(num)) return null;
    if(num < 1 || num > 300) return null;
    return num;
}

function isSafeColor(value){
    return /^#[0-9a-fA-F]{6}$/.test(String(value).trim());
}

createPrefUI({
    features: PREF_ORDER.map(p=>({
        properties:{ N03_001: p }
    }))
});

// 初期色
setTimeout(()=>setColor(currentColor),100);

starData.forEach(addStar);

</script>

</body>
</html>
